name: Laravel Pint Auto-Formatter

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist
        
      - name: Run Laravel Pint (Fix Code Style)
        run: vendor/bin/pint
        
      - name: Commit formatting changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: run Laravel Pint auto-formatter"
          branch: ${{ github.head_ref }}
